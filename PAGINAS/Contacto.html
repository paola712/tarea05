<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../estilos/styles.css">

<style>
.fondo {
  background: linear-gradient(to right, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  align-items: center;
}

.form-card {
  background: white;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<a href="inicio.html" class="btn btn-dark m-3">Volver</a>

<div class="fondo">

<div class="container">
<div class="row justify-content-center">

<div class="col-md-6">

<div class="form-card">

<h2 class="text-center mb-4">Contáctanos</h2>

<form>

<div class="mb-3">
<label class="form-label">Nombre completo</label>
<input type="text" class="form-control" placeholder="Ingresa tu nombre">
</div>

<div class="mb-3">
<label class="form-label">Correo electrónico</label>
<input type="email" class="form-control" placeholder="ejemplo@gmail.com">
</div>

<div class="mb-3">
<label class="form-label">Asunto</label>
<input type="text" class="form-control" placeholder="Motivo del mensaje">
</div>

<div class="mb-3">
<label class="form-label">Mensaje</label>
<textarea class="form-control" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
</div>

<div class="d-grid">
<button class="btn btn-primary btn-lg">Enviar mensaje</button>
</div>

</form>

<hr>

<p class="text-center text-muted">
Este formulario es solo demostrativo para el proyecto del Día del Trabajador.
</p>

</div>

</div>

</div>
</div>

</div>
<footer>
<p>Paola Lizet Choquehuanca Lucas</p>
</footer>
</body>
</html>
